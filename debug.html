
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
        </script>
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
        <style>
            
/* ========================
   BASE TYPOGRAPHY
   ======================== */
body { 
    font-family: "Times New Roman", Times, serif; 
    font-size: 12pt; 
    line-height: 1.5; 
    color: #000; 
    margin: 0 auto; 
    padding: 40px; 
    max-width: 800px; 
    text-align: justify; 
}

/* ========================
   TABLE OF CONTENTS
   ======================== */
.toc { 
    margin-bottom: 50px; 
}

.toc h1 { 
    text-align: center; 
    border-bottom: 2px solid #000; 
    padding-bottom: 10px; 
}

.toc ul { 
    list-style: none; 
    padding: 0; 
}

.toc li { 
    margin-bottom: 8px; 
    border-bottom: 1px dotted #ccc; 
}

.toc a { 
    text-decoration: none; 
    color: #000; 
    display: block; 
    width: 100%; 
}

.toc-indent { 
    margin-left: 20px; 
    font-size: 0.95em; 
    color: #444; 
}

/* ========================
   PAGE BREAKS
   ======================== */
.page-break { 
    page-break-after: always; 
}

/* ========================
   HEADINGS
   ======================== */
h1 { 
    text-align: center; 
    font-size: 24pt; 
    font-weight: bold; 
    margin-bottom: 30px; 
    text-transform: uppercase; 
    margin-top: 0; 
}

h2 { 
    font-size: 18pt; 
    font-weight: bold; 
    border-bottom: 1px solid #000; 
    padding-bottom: 5px; 
    margin-top: 30px; 
}

h3 { 
    font-size: 16pt; 
    font-weight: bold; 
    margin-top: 25px; 
    color: #000; 
    text-decoration: underline;
}

h4 { 
    font-size: 14pt; 
    font-weight: bold; 
    margin-top: 20px; 
    color: #333; 
}

/* ========================
   CONTENT ELEMENTS
   ======================== */
p { 
    margin-bottom: 15px; 
}

ul, ol { 
    margin-bottom: 15px; 
    padding-left: 30px; 
}

/* ========================
   TABLES
   ======================== */
table { 
    border-collapse: collapse; 
    width: 100%; 
    margin: 20px 0; 
}

th, td { 
    border: 1px solid #000; 
    padding: 8px; 
    text-align: left; 
}

th { 
    background-color: #eee; 
    font-weight: bold; 
}

/* ========================
   MATH (MathJax)
   ======================== */
.MathJax { 
    font-size: 110%; 
}

/* ========================
   PRINT OPTIMIZATION
   ======================== */
h1, h2, h3, h4 { 
    page-break-after: avoid; 
}

img, table, pre { 
    page-break-inside: avoid; 
}

/* ========================
   CODE BLOCKS
   ======================== */
pre {
    background-color: #f6f8fa;
    padding: 15px;
    border-radius: 5px;
    overflow-x: auto;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 10pt;
    line-height: 1.4;
    border: 1px solid #ddd;
}

code {
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    background-color: #f0f0f0;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 0.9em;
}

pre code {
    background-color: transparent;
    padding: 0;
}

/* ========================
   SYNTAX HIGHLIGHTING (GitHub Style)
   ======================== */
.hljs {
    background: #f6f8fa;
    color: #24292e;
}

.hljs-comment,
.hljs-quote {
    color: #6a737d;
    font-style: italic;
}

.hljs-keyword,
.hljs-selector-tag,
.hljs-addition {
    color: #d73a49;
}

.hljs-number,
.hljs-string,
.hljs-meta .hljs-meta-string,
.hljs-literal,
.hljs-doctag,
.hljs-regexp {
    color: #032f62;
}

.hljs-string {
    color: #22863a;
}

.hljs-title,
.hljs-section,
.hljs-name,
.hljs-selector-id,
.hljs-selector-class {
    color: #6f42c1;
    font-weight: bold;
}

.hljs-attribute,
.hljs-attr,
.hljs-variable,
.hljs-template-variable,
.hljs-class .hljs-title,
.hljs-type {
    color: #005cc5;
}

.hljs-symbol,
.hljs-bullet,
.hljs-subst,
.hljs-meta,
.hljs-meta .hljs-keyword,
.hljs-selector-attr,
.hljs-selector-pseudo,
.hljs-link {
    color: #e36209;
}

.hljs-built_in,
.hljs-deletion {
    color: #b31d28;
}

.hljs-formula {
    background: #f6f8fa;
}

.hljs-emphasis {
    font-style: italic;
}

.hljs-strong {
    font-weight: bold;
}

/* ========================
   BLOCKQUOTES
   ======================== */
blockquote {
    border-left: 4px solid #333;
    margin: 20px 0;
    padding: 10px 20px;
    background-color: #f9f9f9;
    font-style: italic;
}

            
        </style>
    </head>
    <body>
        
        <p><code>c int x = 5; void foo() {} </code></p>

    </body>
    </html>
